<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>동물탑 · Animal Tower</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-top:#AEE3F5;
    --sky-bottom:#FFF3D6;
    --wood-light:#E8A672;
    --wood-dark:#C97B4A;
    --coral:#FF8C69;
    --coral-dark:#E86C4A;
    --mint:#6FD9A8;
    --ink:#3A3145;
    --paper:#FFFDF8;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0;padding:0;height:100%;overflow:hidden;
    font-family:'Nunito',system-ui,sans-serif;
    background:linear-gradient(180deg,var(--sky-top) 0%,var(--sky-bottom) 100%);
    touch-action:none;
    -webkit-user-select:none;user-select:none;
  }
  #game-container{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  #game-container canvas{display:block;touch-action:none;}

  .hud{
    position:fixed;top:0;left:0;right:0;
    display:flex;justify-content:space-between;align-items:flex-start;
    padding:16px 16px 0 16px;pointer-events:none;z-index:10;
  }
  .badge{
    background:rgba(255,253,248,.92);
    border-radius:18px;
    padding:8px 16px;
    box-shadow:0 4px 0 rgba(0,0,0,.08), 0 8px 18px rgba(80,50,20,.12);
    font-family:'Baloo 2',sans-serif;
    color:var(--ink);
  }
  .badge .label{font-size:11px;font-weight:600;letter-spacing:.06em;color:#9A8FA8;text-transform:uppercase;}
  .badge .value{font-size:22px;font-weight:800;line-height:1.1;color:var(--coral-dark);}
  .badge.best .value{color:var(--mint);}

  .title-eyebrow{
    position:fixed;top:16px;left:50%;transform:translateX(-50%);
    font-family:'Baloo 2',sans-serif;font-weight:700;color:var(--ink);
    background:rgba(255,253,248,.85);padding:6px 18px;border-radius:14px;
    font-size:14px;letter-spacing:.03em;z-index:9;pointer-events:none;
  }

  #hint{
    position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
    font-family:'Baloo 2',sans-serif;font-size:14px;color:var(--ink);
    background:rgba(255,253,248,.9);padding:8px 18px;border-radius:20px;
    box-shadow:0 3px 0 rgba(0,0,0,.06);z-index:10;transition:opacity .4s;
  }

  #charUploadPanel{
    position:fixed;top:0;left:0;right:0;bottom:0;
    background:rgba(58,49,69,.7);display:none;z-index:30;
    flex-direction:column;align-items:center;justify-content:center;
  }
  #charUploadPanel.show{display:flex;}
  .upload-card{
    background:var(--paper);border-radius:24px;padding:28px;
    width:min(360px,90vw);box-shadow:0 12px 40px rgba(80,50,20,.25);
  }
  .upload-card h2{font-family:'Baloo 2',sans-serif;margin:0 0 16px;color:var(--ink);}
  .upload-card p{margin:0 0 20px;font-size:14px;color:#8B8296;line-height:1.5;}
  .file-input-wrap{position:relative;overflow:hidden;border-radius:12px;margin-bottom:16px;}
  .file-input-wrap input[type="file"]{position:absolute;opacity:0;width:0;height:0;}
  .file-input-wrap label{
    display:block;padding:20px;background:#F0F0F5;text-align:center;
    cursor:pointer;border:2px dashed #D0CCDE;border-radius:12px;
    font-family:'Baloo 2',sans-serif;font-weight:600;color:var(--ink);
    transition:all .2s;
  }
  .file-input-wrap label:hover{background:#E8E4F0;border-color:var(--coral);}
  .file-input-wrap.dragging label{background:#E8E4F0;border-color:var(--coral);}

  #extractPreview{
    margin:16px 0;padding:16px;background:#F8F8FC;border-radius:12px;
    text-align:center;min-height:200px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
  }
  #previewGrid canvas{width:76px;height:76px;border-radius:10px;background:#fff;box-shadow:0 2px 6px rgba(80,50,20,.12);}
  #previewGrid .thumb{position:relative;}
  #previewGrid .thumb .rm{
    position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;
    background:var(--coral);color:#fff;font-size:12px;line-height:20px;text-align:center;
    cursor:pointer;box-shadow:0 2px 4px rgba(0,0,0,.2);
  }
  #extractPreview .info{font-size:13px;color:#8B8296;margin-top:10px;}
  
  .button-group{display:flex;gap:12px;}
  .button-group button{flex:1;}
  button.secondary{background:#E8E4F0;color:var(--ink);box-shadow:0 3px 0 #D0CCDE;}
  button.secondary:active{transform:translateY(2px);box-shadow:0 1px 0 #D0CCDE;}

  #overlay{
    position:fixed;inset:0;background:rgba(58,49,69,.55);
    display:flex;align-items:center;justify-content:center;z-index:20;
    opacity:0;pointer-events:none;transition:opacity .25s ease;
  }
  #overlay.show{opacity:1;pointer-events:auto;}
  .panel{
    background:var(--paper);border-radius:28px;padding:32px 28px;
    width:min(320px,86vw);text-align:center;
    box-shadow:0 12px 0 rgba(0,0,0,.08), 0 24px 40px rgba(80,50,20,.25);
    transform:translateY(10px) scale(.96);transition:transform .25s ease;
  }
  #overlay.show .panel{transform:translateY(0) scale(1);}
  .panel h1{
    font-family:'Baloo 2',sans-serif;font-size:26px;margin:0 0 4px;color:var(--ink);
  }
  .panel p.sub{margin:0 0 18px;color:#8B8296;font-size:14px;}
  .stat-row{display:flex;justify-content:space-around;margin:14px 0 20px;}
  .stat{text-align:center;}
  .stat .n{font-family:'Baloo 2',sans-serif;font-size:28px;font-weight:800;color:var(--coral-dark);}
  .stat .l{font-size:12px;color:#9A8FA8;font-weight:700;text-transform:uppercase;letter-spacing:.05em;}
  .newbest{
    display:inline-block;margin-bottom:14px;font-family:'Baloo 2',sans-serif;
    background:var(--mint);color:#fff;padding:4px 14px;border-radius:12px;font-size:13px;font-weight:700;
  }
  button.cta{
    font-family:'Baloo 2',sans-serif;font-size:17px;font-weight:700;color:#fff;
    background:var(--coral);border:none;border-radius:16px;
    padding:14px 0;width:100%;cursor:pointer;
    box-shadow:0 5px 0 var(--coral-dark);
    transition:transform .08s ease;
  }
  button.cta:active{transform:translateY(4px);box-shadow:0 1px 0 var(--coral-dark);}

  #startPanel .animals-preview{font-size:34px;margin:6px 0 16px;letter-spacing:6px;}
</style>
</head>
<body>

<div class="title-eyebrow">🐾 동물탑 · Animal Tower</div>

<div class="hud">
  <div class="badge">
    <div class="label">Height</div>
    <div class="value" id="hudHeight">0m</div>
  </div>
  <div class="badge best">
    <div class="label">Best</div>
    <div class="value" id="hudBest">0</div>
  </div>
</div>

<div id="hint">← 좌우로 옮기고, 탭해서 떨어뜨리세요 →</div>

<div id="game-container"></div>

<div id="charUploadPanel">
  <div class="upload-card">
    <h2>🎨 캐릭터 추가</h2>
    <p>배경이 투명한 PNG를 올리면<br>윤곽선을 따서 자동으로 물리 엔진을 적용합니다.<br>여러 장을 한 번에 선택할 수 있어요.</p>

    <div class="file-input-wrap" id="dropZone">
      <input type="file" id="charInput" accept="image/png" multiple />
      <label for="charInput">📁 PNG 파일을 여기 드래그<br>또는 클릭해서 선택 (여러 장 가능)</label>
    </div>

    <div id="extractPreview" style="display:none;">
      <div id="previewGrid" style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;"></div>
      <div class="info" id="extractInfo">윤곽선을 자동 추출했습니다</div>
    </div>

    <div class="button-group" id="uploadButtons" style="display:none;">
      <button class="secondary" id="cancelUploadBtn">취소</button>
      <button class="cta" id="confirmUploadBtn">적용하기</button>
    </div>
  </div>
</div>

<div id="overlay" class="show">
  <div class="panel" id="startPanel">
    <h1>동물탑</h1>
    <p class="sub">모두 같은 능력치, 다른 건 오직 형태뿐.<br>무너지지 않게 최대한 높이 쌓아보세요.</p>
    <div class="animals-preview">🐱🐱🐱🐱🐱</div>
    <button class="cta" id="startBtn">게임 시작</button>
    <button class="secondary" id="uploadCharBtn" style="margin-top:12px;">+ 캐릭터 추가</button>
  </div>

  <div class="panel" id="overPanel" style="display:none;">
    <h1>게임 오버</h1>
    <div id="newBestTag" class="newbest" style="display:none;">🎉 최고 기록 갱신!</div>
    <div class="stat-row">
      <div class="stat"><div class="n" id="finalHeight">0m</div><div class="l">Height</div></div>
      <div class="stat"><div class="n" id="finalCount">0</div><div class="l">Animals</div></div>
      <div class="stat"><div class="n" id="finalScore">0</div><div class="l">Score</div></div>
    </div>
    <button class="cta" id="retryBtn">다시 도전</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>

// Build the playable roster from the extracted cat poses.
// (Legacy shape types 'rect' / 'round' / 'narrowTop' / 'narrowBottom' / 'custom'
//  are still supported by getShapeVertices()/drawAnimalGraphic() below, in case
//  you want to mix in hand-coded shapes too.)
const ANIMALS = CAT_CHARACTERS.map(c => ({
  key: c.key,
  name: '냥이',
  shape: 'imageHull',
  w: c.w, h: c.h,
  originX: c.originX, originY: c.originY,
  hullVerts: c.verts,
  textureKey: 'tex_' + c.key,
  imgData: c.img
}));

// Characters added at runtime via the "+ 캐릭터 추가" upload panel
// get pushed into this array (see extractCharacterFromFile below), and are
// merged into ANIMALS before the game boots.
const CUSTOM_ANIMALS = [];

// world / platform config
const PLATFORM_WIDTH = 300;
const PLATFORM_TOP_Y = 560;     // world y of platform top surface
const PLATFORM_THICK = 40;
const SPAWN_OFFSET_Y = 120;     // spawn point distance above camera top
const SETTLE_VEL = 0.06;
const SETTLE_ANG = 0.02;

let gameW = Math.min(window.innerWidth, 480);
let gameH = window.innerHeight;

let currentBest = parseInt(localStorage.getItem(STORAGE_KEY) || '0', 10);
document.getElementById('hudBest').textContent = currentBest;

// ------------------------------------------------------------------------

class MainScene extends Phaser.Scene {
  constructor(){ super('main'); }

  init(){
    this.animalCount = 0;
    this.maxHeightPx = 0;
    this.gameOver = false;
    this.started = false;
    this.pendingSpawn = null;   // { body, gfx, def }
    this.dropped = false;
    this.stackBodies = [];
    this.platformX = gameW/2;
    this.settleTimer = 0;
    this.waitingSettle = false;
  }

  preload(){
    // load every character's base64 texture (built-in + any custom uploads)
    const allDefs = ANIMALS.concat(CUSTOM_ANIMALS);
    for(const def of allDefs){
      if(def.imgData && def.textureKey){
        this.load.image(def.textureKey, def.imgData);
      }
    }
  }

  create(){
    const platformX = this.platformX;

    // background gradient (drawn once, fixed to camera)
    this.bg = this.add.graphics().setScrollFactor(0).setDepth(-100);
    this.drawBackground();

    // clouds (parallax decoration)
    this.clouds = [];
    for(let i=0;i<5;i++){
      const c = this.add.ellipse(
        Phaser.Math.Between(30, gameW-30),
        Phaser.Math.Between(60, gameH*0.5),
        Phaser.Math.Between(50,90), Phaser.Math.Between(24,36),
        0xffffff, 0.75
      ).setScrollFactor(0.15).setDepth(-50);
      this.clouds.push(c);
    }

    // matter world tuning
    this.matter.world.setBounds(-2000, -20000, gameW+4000, 26000, 64, false, false, true, true);
    this.matter.world.engine.gravity.y = 1.0;

    // ----- platform -----
    this.platformLeft = platformX - PLATFORM_WIDTH/2;
    this.platformRight = platformX + PLATFORM_WIDTH/2;

    const pg = this.add.graphics().setDepth(5);
    pg.fillStyle(PALETTE.woodDark,1);
    pg.fillRoundedRect(this.platformLeft-6, PLATFORM_TOP_Y, PLATFORM_WIDTH+12, PLATFORM_THICK+400, 14);
    pg.fillStyle(PALETTE.wood,1);
    pg.fillRoundedRect(this.platformLeft, PLATFORM_TOP_Y, PLATFORM_WIDTH, PLATFORM_THICK+400, {tl:14,tr:14,bl:0,br:0});
    pg.fillStyle(PALETTE.woodLight,1);
    pg.fillRoundedRect(this.platformLeft, PLATFORM_TOP_Y, PLATFORM_WIDTH, 16, {tl:14,tr:14,bl:0,br:0});

    this.matter.add.rectangle(platformX, PLATFORM_TOP_Y + PLATFORM_THICK/2, PLATFORM_WIDTH, PLATFORM_THICK, {
      isStatic:true, label:'platform', friction:0.9
    });

    // NOTE: intentionally no side walls. Animals are allowed to lean, slide,
    // and tip off the edge of the platform sideways -- that's normal tower
    // physics. The game only ends when a stacked/falling animal actually
    // drops below the platform's surface (checked every frame in update(),
    // see FALL_LIMIT_Y below). This fixes the old behaviour where drifting
    // slightly outside the platform width ended the game immediately.

    // camera setup
    this.cameras.main.setBounds(0, -100000, gameW, 200000);
    this.cameras.main.scrollY = PLATFORM_TOP_Y - gameH + 140;
    this.targetScrollY = this.cameras.main.scrollY;

    // y-level below which a stacked animal counts as "fallen off the tower"
    this.fallLimitY = PLATFORM_TOP_Y + PLATFORM_THICK + 90;

    this.input.on('pointermove', (p)=>{ this.handlePointerMove(p); });
    this.input.on('pointerdown', (p)=>{ this.handlePointerDown(p); });
    this.input.on('pointerup', (p)=>{ this.handleTap(p); });

    this.spawnNext();
  }

  drawBackground(){
    this.bg.clear();
    this.bg.fillGradientStyle(PALETTE.sky1, PALETTE.sky1, PALETTE.sky2, PALETTE.sky2, 1);
    this.bg.fillRect(0,0,gameW,gameH);
  }

  // ---- animal texture / body creation -----------------------------------
  // 커스텀 정점 정의 예시 (사용자가 추가할 때 사용):
  // {
  //   key: 'dragon',
  //   name: '드래곤',
  //   color: 0xFF6B6B,
  //   dark: 0xCC5555,
  //   w: 120,
  //   h: 100,
  //   shape: 'custom',
  //   customVertices: [
  //     {x: -20, y: -50},
  //     {x: 50, y: -30},
  //     {x: 60, y: 10},
  //     {x: 40, y: 50},
  //     {x: -40, y: 50},
  //     {x: -60, y: 10},
  //     {x: -50, y: -30}
  //   ]
  // }

  getShapeVertices(def){
    const w = def.w, h = def.h;
    switch(def.shape){
      case 'imageHull':
        // convex-hull vertices auto-extracted from the source PNG's alpha
        // channel, already centered on the shape's own centroid.
        return def.hullVerts;
      case 'custom':
        // 사용자 정의 정점 그대로 반환 (정점이 -w/2 ~ w/2, -h/2 ~ h/2 범위 내라고 가정)
        return def.customVertices || [];
      case 'narrowTop': // e.g. rabbit: wide base, narrow top (ears above, decorative)
        return [
          {x:-w*0.28, y:-h/2}, {x:w*0.28, y:-h/2},
          {x:w/2, y:h/2}, {x:-w/2, y:h/2}
        ];
      case 'narrowBottom': // e.g. penguin: wide top, narrow base -> unstable
        return [
          {x:-w/2, y:-h/2}, {x:w/2, y:-h/2},
          {x:w*0.26, y:h/2}, {x:-w*0.26, y:h/2}
        ];
      case 'round': {
        const pts=[]; const n=10;
        for(let i=0;i<n;i++){
          const a = (i/n)*Math.PI*2;
          pts.push({x:Math.cos(a)*w/2, y:Math.sin(a)*h/2});
        }
        return pts;
      }
      case 'rect':
      default:
        return [
          {x:-w/2,y:-h/2},{x:w/2,y:-h/2},{x:w/2,y:h/2},{x:-w/2,y:h/2}
        ];
    }
  }

  drawAnimalGraphic(gfx, def){
    const w = def.w, h = def.h;
    gfx.clear();

    // 커스텀 타입은 정점만 그리고 데코레이션 없음
    if(def.shape === 'custom'){
      const verts = this.getShapeVertices(def);
      gfx.fillStyle(def.color, 1);
      gfx.lineStyle(3, def.dark, 1);
      gfx.beginPath();
      if(verts.length > 0){
        gfx.moveTo(verts[0].x, verts[0].y);
        for(let i=1;i<verts.length;i++) gfx.lineTo(verts[i].x, verts[i].y);
        gfx.closePath();
      }
      gfx.fillPath();
      gfx.strokePath();
      return; // 커스텀은 여기까지
    }

    // decorative appendages behind body
    gfx.fillStyle(def.dark, 1);
    if(def.key==='elephant'){
      // ears
      gfx.fillEllipse(-w*0.42, -h*0.05, w*0.34, h*0.5);
      gfx.fillEllipse(w*0.42, -h*0.05, w*0.34, h*0.5);
    }
    if(def.key==='rabbit'){
      // ears above narrow top
      gfx.fillStyle(def.color,1);
      gfx.fillRoundedRect(-w*0.24, -h*0.95, w*0.16, h*0.55, 8);
      gfx.fillRoundedRect(w*0.08, -h*0.95, w*0.16, h*0.55, 8);
      gfx.fillStyle(0xF3AFC2,1);
      gfx.fillRoundedRect(-w*0.20, -h*0.85, w*0.08, h*0.4, 5);
      gfx.fillRoundedRect(w*0.12, -h*0.85, w*0.08, h*0.4, 5);
    }
    if(def.key==='fox'){
      // tail
      gfx.fillStyle(def.color,1);
      gfx.fillTriangle(w*0.48,-h*0.1, w*0.85,-h*0.55, w*0.62,h*0.25);
      gfx.fillStyle(0xffffff,1);
      gfx.fillTriangle(w*0.62,-h*0.25, w*0.82,-h*0.5, w*0.68,h*0.05);
    }
    if(def.key==='penguin'){
      // small wings
      gfx.fillStyle(def.dark,1);
      gfx.fillEllipse(-w*0.42,-h*0.05,w*0.2,h*0.5);
      gfx.fillEllipse(w*0.42,-h*0.05,w*0.2,h*0.5);
    }

    // body (matches physics silhouette)
    const verts = this.getShapeVertices(def);
    gfx.fillStyle(def.color,1);
    gfx.lineStyle(4, def.dark, 1);
    gfx.beginPath();
    gfx.moveTo(verts[0].x, verts[0].y);
    for(let i=1;i<verts.length;i++) gfx.lineTo(verts[i].x, verts[i].y);
    gfx.closePath();
    gfx.fillPath();
    gfx.strokePath();

    // belly / accent patch
    gfx.fillStyle(def.key==='penguin' ? 0xffffff : (def.key==='elephant'? 0xD8DCE1 : 0xffffff), def.key==='fox'?0:0.55);
    if(def.shape==='round'){
      gfx.fillEllipse(0, h*0.12, w*0.5, h*0.4);
    } else {
      gfx.fillEllipse(0, h*0.18, w*0.42, h*0.34);
    }

    // face: eyes + blush (cute signature detail, same on every animal)
    const eyeY = -h*0.06;
    const eyeDX = w*0.14;
    gfx.fillStyle(0x2b2530,1);
    gfx.fillCircle(-eyeDX, eyeY, 4.2);
    gfx.fillCircle(eyeDX, eyeY, 4.2);
    gfx.fillStyle(0xffffff,1);
    gfx.fillCircle(-eyeDX+1.4, eyeY-1.4, 1.4);
    gfx.fillCircle(eyeDX+1.4, eyeY-1.4, 1.4);
    gfx.fillStyle(0xFF9E9E, 0.55);
    gfx.fillEllipse(-w*0.24, eyeY+h*0.11, w*0.11, h*0.06);
    gfx.fillEllipse(w*0.24, eyeY+h*0.11, w*0.11, h*0.06);
    // little smile
    gfx.lineStyle(2.4, 0x2b2530, 1);
    gfx.beginPath();
    gfx.arc(0, eyeY+h*0.08, w*0.07, 0.15*Math.PI, 0.85*Math.PI, false);
    gfx.strokePath();
  }

  makeAnimalDisplay(def){
    if(def.shape === 'imageHull'){
      // texture pivot (originX/originY) is set to the shape's own centroid,
      // which is exactly where Matter.js will place the physics body's
      // position -- so the sprite and the hull line up perfectly.
      const img = this.add.image(0,0, def.textureKey);
      img.setOrigin(def.originX, def.originY);
      return img;
    }
    const container = this.add.container(0,0);
    const gfx = this.add.graphics();
    this.drawAnimalGraphic(gfx, def);
    container.add(gfx);
    return container;
  }

  spawnNext(){
    if(this.gameOver) return;
    const pool = ANIMALS.concat(CUSTOM_ANIMALS);
    const def = Phaser.Utils.Array.GetRandom(pool);
    const camTop = this.cameras.main.scrollY;
    const spawnY = camTop + SPAWN_OFFSET_Y;

    const display = this.makeAnimalDisplay(def);
    display.setPosition(this.platformX, spawnY);
    display.setDepth(10);

    this.pendingSpawn = { display, def, x:this.platformX, y:spawnY };
    this.dropped = false;
    this.updateHint('← 좌우로 옮기고, 탭해서 떨어뜨리세요 →');
  }

  handlePointerMove(p){
    if(!this.pendingSpawn || this.dropped || this.gameOver) return;
    const worldPoint = this.cameras.main.getWorldPoint(p.x, p.y);
    const half = this.pendingSpawn.def.w/2;
    let x = Phaser.Math.Clamp(worldPoint.x, this.platformLeft + half*0.5, this.platformRight - half*0.5);
    this.pendingSpawn.x = x;
    this.pendingSpawn.display.x = x;
  }

  handlePointerDown(p){
    this.dragStartX = p.x;
  }

  handleTap(p){
    if(!this.pendingSpawn || this.dropped || this.gameOver) return;
    // treat as tap-to-drop (small movement threshold so it still works after a drag)
    this.dropCurrent();
  }

  dropCurrent(){
    const { display, def, x, y } = this.pendingSpawn;
    this.dropped = true;

    const verts = this.getShapeVertices(def);
    const body = this.matter.bodies.fromVertices(x, y, [verts], {
      ...PHYSICS_MATERIAL,
      label:'animal'
    }, true);

    // fromVertices may recenter; sync display via matter gameobject instead
    display.destroy();
    const mDisplay = this.makeAnimalDisplay(def);
    mDisplay.setDepth(10);
    this.matter.add.gameObject(mDisplay, body);
    mDisplay.setExistingBody(body);
    mDisplay.setPosition(x,y);

    this.stackBodies.push({ body, def });
    this.animalCount++;
    this.pendingSpawn = null;
    this.waitingSettle = true;
    this.settleTimer = 0;
    this.updateHint('착지를 기다리는 중...');
  }

  triggerGameOver(){
    if(this.gameOver) return;
    this.gameOver = true;
    this.showGameOver();
  }

  showGameOver(){
    const heightM = (this.maxHeightPx/60).toFixed(1);
    const score = Math.round(this.maxHeightPx*2 + this.animalCount*40);
    const isNew = score > currentBest;
    if(isNew){ currentBest = score; localStorage.setItem(STORAGE_KEY, String(currentBest)); }

    document.getElementById('finalHeight').textContent = heightM+'m';
    document.getElementById('finalCount').textContent = this.animalCount;
    document.getElementById('finalScore').textContent = score;
    document.getElementById('newBestTag').style.display = isNew? 'inline-block':'none';
    document.getElementById('hudBest').textContent = currentBest;

    document.getElementById('startPanel').style.display='none';
    document.getElementById('overPanel').style.display='block';
    document.getElementById('overlay').classList.add('show');
    this.updateHint('');
  }

  updateHint(text){
    const el = document.getElementById('hint');
    if(!text){ el.style.opacity=0; }
    else { el.style.opacity=1; el.textContent=text; }
  }

  updateHUD(){
    const heightM = (this.maxHeightPx/60).toFixed(1);
    document.getElementById('hudHeight').textContent = heightM+'m';
  }

  update(time, delta){
    if(this.gameOver) return;

    // track tallest stacked point (world y, smaller = higher)
    // AND check whether any animal has actually fallen below the platform.
    // Sideways drift/tipping never ends the game by itself -- only an
    // animal's bottom edge dropping past this.fallLimitY does.
    let minY = PLATFORM_TOP_Y;
    for(const s of this.stackBodies){
      const topY = s.body.bounds.min.y;
      if(topY < minY) minY = topY;
      if(s.body.bounds.min.y > this.fallLimitY){
        this.triggerGameOver();
        return;
      }
    }
    const heightPx = Math.max(0, PLATFORM_TOP_Y - minY);
    if(heightPx > this.maxHeightPx){ this.maxHeightPx = heightPx; this.updateHUD(); }

    // camera follow: keep top of stack comfortably visible
    const desiredTop = minY - SPAWN_OFFSET_Y - 40;
    const desiredScrollY = Math.min(this.cameras.main.scrollY, desiredTop);
    this.cameras.main.scrollY += (desiredScrollY - this.cameras.main.scrollY) * Math.min(1, delta/250);

    // keep pending (unfrozen) animal following camera position vertically if not dropped
    if(this.pendingSpawn && !this.dropped){
      const camTop = this.cameras.main.scrollY;
      const targetY = camTop + SPAWN_OFFSET_Y;
      this.pendingSpawn.display.y = targetY;
      this.pendingSpawn.y = targetY;
    }

    // settle detection -> spawn next
    if(this.waitingSettle){
      let allSettled = true;
      for(const s of this.stackBodies){
        const v = s.body.velocity;
        const av = s.body.angularVelocity;
        if(Math.abs(v.x)+Math.abs(v.y) > SETTLE_VEL || Math.abs(av) > SETTLE_ANG){ allSettled=false; break; }
      }
      this.settleTimer += delta;
      if(allSettled || this.settleTimer > 1800){
        this.waitingSettle = false;
        this.spawnNext();
      }
    }
  }
}

const config = {
  type: Phaser.AUTO,
  width: gameW,
  height: gameH,
  parent: 'game-container',
  backgroundColor: '#AEE3F5',
  banner: false, // suppress the "Phaser vX.X (WebGL | Web Audio)" console banner
  physics: { default:'matter', matter: { gravity:{y:1}, debug:false } },
  scene: [MainScene],
  scale: { mode: Phaser.Scale.NONE }
};

let game = null;

function boot(){
  if(game) return;
  game = new Phaser.Game(config);
}

function restart(){
  if(game){
    // 현재 scene 모두 정지 및 제거
    const scenes = game.scene.scenes;
    for(const scene of scenes){
      if(scene.isActive()) game.scene.stop(scene.key);
    }
    // 완전히 정리
    game.destroy(true);
    game=null;
  }
  
  // 새 설정으로 초기화
  gameW = Math.min(window.innerWidth, 480);
  gameH = window.innerHeight;
  config.width = gameW;
  config.height = gameH;
  
  // 새 게임 생성
  game = new Phaser.Game(config);
}

document.getElementById('startBtn').addEventListener('click', ()=>{
  document.getElementById('overlay').classList.remove('show');
  boot();
});
document.getElementById('retryBtn').addEventListener('click', ()=>{
  document.getElementById('overlay').classList.remove('show');
  restart();
});

window.addEventListener('resize', ()=>{
  gameW = Math.min(window.innerWidth, 480);
  gameH = window.innerHeight;
  if(game){ game.scale.resize(gameW, gameH); }
});

/* =========================================================
   Custom character upload: PNG -> alpha outline -> convex hull
   -> physics vertices + cropped texture, all done client-side
   with <canvas>. Mirrors the pipeline used to pre-build the
   built-in cat poses (same idea, done in-browser instead).
   ========================================================= */

const CHAR_TARGET_MAX = 130;   // matches scale of built-in characters
const CHAR_MAX_HULL_POINTS = 16;

function computeConvexHull(points){
  // Andrew's monotone chain
  const pts = points.slice().sort((a,b)=> a.x-b.x || a.y-b.y);
  const cross = (o,a,b)=> (a.x-o.x)*(b.y-o.y) - (a.y-o.y)*(b.x-o.x);
  const lower = [];
  for(const p of pts){
    while(lower.length>=2 && cross(lower[lower.length-2], lower[lower.length-1], p) <= 0) lower.pop();
    lower.push(p);
  }
  const upper = [];
  for(let i=pts.length-1;i>=0;i--){
    const p = pts[i];
    while(upper.length>=2 && cross(upper[upper.length-2], upper[upper.length-1], p) <= 0) upper.pop();
    upper.push(p);
  }
  upper.pop(); lower.pop();
  return lower.concat(upper);
}

function polygonCentroid(pts){
  let A=0, cx=0, cy=0;
  for(let i=0;i<pts.length;i++){
    const p0=pts[i], p1=pts[(i+1)%pts.length];
    const cr = p0.x*p1.y - p1.x*p0.y;
    A += cr; cx += (p0.x+p1.x)*cr; cy += (p0.y+p1.y)*cr;
  }
  A *= 0.5;
  if(Math.abs(A) < 1e-6){
    const n = pts.length;
    return { x: pts.reduce((s,p)=>s+p.x,0)/n, y: pts.reduce((s,p)=>s+p.y,0)/n };
  }
  return { x: cx/(6*A), y: cy/(6*A) };
}

function extractCharacterFromImage(img){
  const cap = 500;
  let nw = img.naturalWidth, nh = img.naturalHeight;
  if(Math.max(nw,nh) > cap){
    const s = cap/Math.max(nw,nh);
    nw = Math.round(nw*s); nh = Math.round(nh*s);
  }
  const c0 = document.createElement('canvas');
  c0.width = nw; c0.height = nh;
  const ctx0 = c0.getContext('2d');
  ctx0.drawImage(img, 0, 0, nw, nh);
  const data0 = ctx0.getImageData(0,0,nw,nh).data;

  // tight bbox around non-transparent pixels
  let minX=nw, maxX=-1, minY=nh, maxY=-1;
  for(let y=0;y<nh;y++){
    for(let x=0;x<nw;x++){
      if(data0[(y*nw+x)*4+3] > 20){
        if(x<minX)minX=x; if(x>maxX)maxX=x;
        if(y<minY)minY=y; if(y>maxY)maxY=y;
      }
    }
  }
  if(maxX<0) return null; // fully transparent PNG

  const pad = 2;
  minX=Math.max(0,minX-pad); minY=Math.max(0,minY-pad);
  maxX=Math.min(nw-1,maxX+pad); maxY=Math.min(nh-1,maxY+pad);
  const cw = maxX-minX+1, chh = maxY-minY+1;

  // crop + scale to the game's character scale
  const scale = CHAR_TARGET_MAX / Math.max(cw,chh);
  const W = Math.max(1,Math.round(cw*scale)), H = Math.max(1,Math.round(chh*scale));
  const c1 = document.createElement('canvas');
  c1.width=W; c1.height=H;
  const ctx1 = c1.getContext('2d');
  ctx1.drawImage(c0, minX,minY,cw,chh, 0,0,W,H);
  const data1 = ctx1.getImageData(0,0,W,H).data;

  // boundary points (row/col extremes) feed the hull -- interior pixels
  // never end up on a convex hull anyway, so this keeps it fast.
  const pts = [];
  for(let y=0;y<H;y++){
    let left=-1,right=-1;
    for(let x=0;x<W;x++){
      if(data1[(y*W+x)*4+3] > 20){ if(left<0) left=x; right=x; }
    }
    if(left>=0){ pts.push({x:left,y}); pts.push({x:right,y}); }
  }
  for(let x=0;x<W;x++){
    let top=-1,bot=-1;
    for(let y=0;y<H;y++){
      if(data1[(y*W+x)*4+3] > 20){ if(top<0) top=y; bot=y; }
    }
    if(top>=0){ pts.push({x,y:top}); pts.push({x,y:bot}); }
  }
  if(pts.length<3) return null;

  let hull = computeConvexHull(pts);
  if(hull.length > CHAR_MAX_HULL_POINTS){
    const step = hull.length / CHAR_MAX_HULL_POINTS;
    const simplified = [];
    for(let i=0;i<CHAR_MAX_HULL_POINTS;i++) simplified.push(hull[Math.floor(i*step)]);
    hull = simplified;
  }

  const centroid = polygonCentroid(hull);
  const verts = hull.map(p=>({x:+(p.x-centroid.x).toFixed(1), y:+(p.y-centroid.y).toFixed(1)}));

  return {
    w: W, h: H,
    originX: +(centroid.x/W).toFixed(4),
    originY: +(centroid.y/H).toFixed(4),
    verts,
    imgData: c1.toDataURL('image/png')
  };
}

function loadImageFromFile(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      const img = new Image();
      img.onload = ()=> resolve(img);
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ---- upload panel wiring ------------------------------------------------
let pendingUploads = []; // [{ result }]

const charInput = document.getElementById('charInput');
const dropZone = document.getElementById('dropZone');
const extractPreview = document.getElementById('extractPreview');
const previewGrid = document.getElementById('previewGrid');
const extractInfo = document.getElementById('extractInfo');
const uploadButtons = document.getElementById('uploadButtons');
const charUploadPanel = document.getElementById('charUploadPanel');

document.getElementById('uploadCharBtn').addEventListener('click', ()=>{
  charUploadPanel.classList.add('show');
});
document.getElementById('cancelUploadBtn').addEventListener('click', closeUploadPanel);

function closeUploadPanel(){
  charUploadPanel.classList.remove('show');
  pendingUploads = [];
  previewGrid.innerHTML = '';
  extractPreview.style.display = 'none';
  uploadButtons.style.display = 'none';
  charInput.value = '';
}

charInput.addEventListener('change', (e)=> handleFiles(e.target.files));

dropZone.addEventListener('dragover', (e)=>{ e.preventDefault(); dropZone.classList.add('dragging'); });
dropZone.addEventListener('dragleave', ()=> dropZone.classList.remove('dragging'));
dropZone.addEventListener('drop', (e)=>{
  e.preventDefault();
  dropZone.classList.remove('dragging');
  handleFiles(e.dataTransfer.files);
});

async function handleFiles(fileList){
  const files = Array.from(fileList).filter(f => f.type === 'image/png');
  if(files.length === 0) return;

  extractPreview.style.display = 'flex';
  extractPreview.style.flexDirection = 'column';
  extractPreview.style.alignItems = 'center';
  extractInfo.textContent = '윤곽선 추출 중...';

  for(const file of files){
    try{
      const img = await loadImageFromFile(file);
      const result = extractCharacterFromImage(img);
      if(!result) continue;
      const item = { result };
      pendingUploads.push(item);
      addThumb(item);
    }catch(err){
      console.warn('캐릭터 추출 실패:', file.name, err);
    }
  }
  extractInfo.textContent = pendingUploads.length + '개 캐릭터의 윤곽선을 추출했습니다';
  uploadButtons.style.display = pendingUploads.length > 0 ? 'flex' : 'none';
}

function addThumb(item){
  const { result } = item;
  const wrap = document.createElement('div');
  wrap.className = 'thumb';
  const canvas = document.createElement('canvas');
  canvas.width = 76; canvas.height = 76;
  const ctx = canvas.getContext('2d');
  const img = new Image();
  img.onload = ()=>{
    const scale = Math.min(66/result.w, 66/result.h);
    const dw = result.w*scale, dh = result.h*scale;
    const dx = (76-dw)/2, dy = (76-dh)/2;
    ctx.drawImage(img, dx, dy, dw, dh);
    ctx.strokeStyle = '#FF8C69';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    result.verts.forEach((v,i)=>{
      const px = dx + dw/2 + v.x*scale;
      const py = dy + dh/2 + v.y*scale;
      if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    });
    ctx.closePath();
    ctx.stroke();
  };
  img.src = result.imgData;

  const rm = document.createElement('div');
  rm.className = 'rm';
  rm.textContent = '×';
  rm.addEventListener('click', ()=>{
    pendingUploads = pendingUploads.filter(u => u !== item);
    wrap.remove();
    extractInfo.textContent = pendingUploads.length + '개 캐릭터의 윤곽선을 추출했습니다';
    uploadButtons.style.display = pendingUploads.length > 0 ? 'flex' : 'none';
  });

  wrap.appendChild(canvas);
  wrap.appendChild(rm);
  previewGrid.appendChild(wrap);
}

document.getElementById('confirmUploadBtn').addEventListener('click', ()=>{
  let n = 0;
  for(const { result } of pendingUploads){
    n++;
    const key = 'custom_' + Date.now() + '_' + n;
    CUSTOM_ANIMALS.push({
      key,
      name: '커스텀',
      shape: 'imageHull',
      w: result.w, h: result.h,
      originX: result.originX, originY: result.originY,
      hullVerts: result.verts,
      textureKey: 'tex_' + key,
      imgData: result.imgData
    });
  }
  closeUploadPanel();
});

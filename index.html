<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>날리기 - 발사 비행 게임</title>
<style>
  :root{
    --sky-ground:#bfe6c9;
    --sky-mid:#7ec8e3;
    --sky-strato:#3a4a8f;
    --sky-space:#0a0a1f;
    --accent:#ff6b4a;
    --accent2:#ffd23f;
    --panel:#1e2233;
    --panel-light:#2b3050;
    --text:#f4f1ea;
    --text-dim:#a9adc9;
    --coin:#ffd23f;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:#0d0e17;color:var(--text);font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",sans-serif;overflow:hidden;height:100%;}
  #app{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:10px;}
  #stage{position:relative;width:100%;max-width:900px;aspect-ratio:16/8;max-height:94vh;background:#000;border-radius:18px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.6);border:3px solid #14162a;}
  canvas{display:block;width:100%;height:100%;}

  #rotatePrompt{
    display:none;position:fixed;inset:0;background:#0a0b14;z-index:999;
    flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;padding:20px;
  }
  #rotatePrompt .icon{font-size:56px;animation:rotateHint 1.6s ease-in-out infinite;}
  #rotatePrompt p{color:var(--text-dim);font-size:14px;max-width:240px;line-height:1.6;}
  @keyframes rotateHint{ 0%,100%{transform:rotate(0deg);} 50%{transform:rotate(90deg);} }
  @media (orientation:portrait) and (max-width:820px){
    #rotatePrompt{display:flex;}
    #app{display:none;}
  }

  #hud{position:absolute;top:0;left:0;right:0;padding:12px 14px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;font-weight:700;}
  .hud-box{background:rgba(10,10,20,.45);backdrop-filter:blur(4px);border-radius:10px;padding:6px 10px;font-size:13px;}
  #distanceReadout{font-size:20px;letter-spacing:.5px;}
  #distanceReadout span{color:var(--accent2);}
  #coinReadout{display:flex;align-items:center;gap:5px;margin-top:6px;}
  .coin-dot{width:10px;height:10px;border-radius:50%;background:var(--coin);box-shadow:0 0 6px var(--coin);}

  #speedWrap{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:110px;}
  #speedLabel{font-size:10px;color:var(--text-dim);letter-spacing:.5px;}
  #speedBar{width:100px;height:7px;border-radius:5px;background:rgba(255,255,255,.15);overflow:hidden;}
  #speedFill{height:100%;width:0%;background:linear-gradient(90deg,#4ad0ff,#ff6b4a);transition:width .08s linear;}
  #speedNum{font-size:12px;font-weight:800;}

  #slamWrap{position:absolute;bottom:96px;left:14px;display:flex;flex-direction:column;align-items:center;gap:5px;pointer-events:none;}
  #slamLabel{font-size:11px;color:var(--text-dim);writing-mode:horizontal-tb;}
  #slamBar{width:14px;height:120px;border-radius:7px;background:rgba(255,255,255,.15);overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;}
  #slamFill{width:100%;height:100%;background:linear-gradient(0deg,#ff6b4a,#ffd23f);transition:height .1s linear;}

  #actionBtn{
    position:absolute;bottom:16px;right:16px;width:84px;height:84px;border-radius:50%;
    border:none;background:radial-gradient(circle at 35% 30%,#ff8a68,var(--accent) 70%);
    color:#fff;font-size:15px;font-weight:800;box-shadow:0 8px 18px rgba(255,107,74,.5),inset 0 2px 4px rgba(255,255,255,.4);
    cursor:pointer;user-select:none;letter-spacing:.5px;
  }
  #actionBtn:active{transform:scale(.94);}

  #settingsBtn{
    position:absolute;top:12px;right:12px;width:38px;height:38px;border-radius:50%;
    border:none;background:rgba(10,10,20,.5);backdrop-filter:blur(4px);color:#fff;font-size:17px;
    cursor:pointer;z-index:6;line-height:1;
  }
  #settingsBtn:active{transform:scale(.92);}

  #settingsOverlay .settings-row{
    width:100%;max-width:280px;display:flex;justify-content:space-between;align-items:center;
    padding:10px 2px;font-size:14px;color:var(--text-dim);
  }
  #settingsOverlay input[type="range"]{width:150px;accent-color:var(--accent);}
  .bigbtn.small{padding:8px 14px;font-size:13px;}

  #startOverlay,#resultOverlay,#shopOverlay,#settingsOverlay{
    position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:linear-gradient(180deg,rgba(10,10,25,.9),rgba(10,10,25,.97));
    text-align:center;padding:24px;gap:14px;z-index:5;
  }
  #startOverlay h1{font-size:30px;margin:0 0 2px;letter-spacing:-.5px;}
  #startOverlay p{color:var(--text-dim);font-size:13px;margin:0;line-height:1.6;max-width:280px;}
  .bigbtn{
    background:var(--accent);color:#fff;border:none;padding:14px 30px;border-radius:14px;font-size:16px;font-weight:800;
    cursor:pointer;box-shadow:0 6px 16px rgba(255,107,74,.45);
  }
  .bigbtn.secondary{background:var(--panel-light);box-shadow:none;}
  .bigbtn:active{transform:scale(.96);}

  #resultOverlay .rank{font-size:64px;font-weight:900;color:var(--accent2);text-shadow:0 4px 20px rgba(255,210,63,.5);margin:0;line-height:1;}
  #resultOverlay .distline{font-size:26px;font-weight:800;margin-top:4px;}
  #resultOverlay .stats{display:flex;gap:18px;margin-top:6px;font-size:13px;color:var(--text-dim);}
  #resultOverlay .stats b{color:var(--text);font-size:15px;display:block;}
  .rowbtns{display:flex;gap:10px;margin-top:10px;}

  #shopOverlay{justify-content:flex-start;padding-top:40px;overflow-y:auto;}
  #shopOverlay h2{margin:0 0 4px;}
  #bankRow{font-size:14px;color:var(--coin);font-weight:800;margin-bottom:14px;}
  .upgrade-card{
    width:100%;max-width:340px;background:var(--panel);border-radius:14px;padding:14px 16px;margin-bottom:10px;
    display:flex;justify-content:space-between;align-items:center;text-align:left;gap:10px;
  }
  .upgrade-card .info{flex:1;}
  .upgrade-card .name{font-weight:800;font-size:14px;}
  .upgrade-card .desc{font-size:11px;color:var(--text-dim);margin-top:2px;}
  .upgrade-card .lvl{font-size:11px;color:var(--accent2);margin-top:4px;}
  .upgrade-card button{
    background:var(--panel-light);border:none;color:var(--text);padding:9px 12px;border-radius:9px;font-size:12px;font-weight:700;
    cursor:pointer;white-space:nowrap;min-width:64px;
  }
  .upgrade-card button:disabled{opacity:.35;cursor:not-allowed;}
  .upgrade-card button:not(:disabled):active{transform:scale(.95);}

  #toast{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    font-size:26px;font-weight:900;color:#fff;text-shadow:0 3px 10px rgba(0,0,0,.6);
    opacity:0;pointer-events:none;z-index:4;
  }
  .hidden{display:none !important;}
</style>
</head>
<body>
<div id="rotatePrompt">
  <div class="icon">📱</div>
  <h2 style="margin:0;">기기를 가로로 돌려주세요</h2>
  <p>이 게임은 가로 모드에서 플레이하도록 설계되었습니다. 휴대폰을 옆으로 돌려주세요!</p>
</div>
<div id="app">
  <div id="stage">
    <canvas id="c"></canvas>

    <div id="hud">
      <div>
        <div id="distanceReadout" class="hud-box">0<span> m</span></div>
        <div id="coinReadout" class="hud-box"><span class="coin-dot"></span><span id="coinCount">0</span></div>
      </div>
      <div id="speedWrap" class="hud-box">
        <div id="speedLabel">속도</div>
        <div id="speedBar"><div id="speedFill"></div></div>
        <div id="speedNum">100</div>
      </div>
      <div class="hud-box" id="zoneLabel">지상</div>
    </div>

    <button id="settingsBtn" title="설정">⚙️</button>

    <div id="slamWrap">
      <div id="slamLabel">슬램 게이지</div>
      <div id="slamBar"><div id="slamFill"></div></div>
    </div>

    <div id="toast"></div>

    <button id="actionBtn">발사!</button>

    <div id="startOverlay">
      <h1>🚀 날리기</h1>
      <p>버튼을 눌러 각도를 정하고, 다시 눌러 파워를 채운 뒤 캐릭터를 날려보세요.<br>비행 중 버튼을 누르면 파워 슬램으로 급강하합니다.<br>최대한 멀리, 높이 날아가 랭크를 올려보세요!</p>
      <button class="bigbtn" id="startBtn">시작하기</button>
      <button class="bigbtn secondary" id="shopBtnStart">업그레이드 상점</button>
    </div>

    <div id="resultOverlay" class="hidden">
      <div class="rank" id="rankText">C</div>
      <div class="distline"><span id="finalDist">0</span> m</div>
      <div class="stats">
        <div>획득 코인<b id="coinsGained">0</b></div>
        <div>최고 기록<b id="bestDist">0 m</b></div>
        <div>슬램 사용<b id="slamCount">0</b></div>
      </div>
      <div class="rowbtns">
        <button class="bigbtn" id="retryBtn">다시 발사</button>
        <button class="bigbtn secondary" id="shopBtnResult">상점</button>
      </div>
    </div>

    <div id="shopOverlay" class="hidden">
      <h2>업그레이드</h2>
      <div id="bankRow">보유 코인: <span id="bankAmt">0</span></div>
      <div id="upgradeList"></div>
      <button class="bigbtn secondary" id="closeShopBtn" style="margin-top:6px;">닫기</button>
    </div>

    <div id="settingsOverlay" class="hidden">
      <h2>설정</h2>
      <div class="settings-row">
        <span>배경음악</span>
        <button class="bigbtn secondary small" id="bgmMuteBtn">🔊 켜짐</button>
      </div>
      <div class="settings-row">
        <span>볼륨</span>
        <input type="range" id="bgmVolume" min="0" max="100" value="40">
      </div>
      <div class="rowbtns" style="margin-top:14px;">
        <button class="bigbtn" id="settingsRetryBtn">다시 시작</button>
        <button class="bigbtn secondary" id="settingsMenuBtn">메인 메뉴로</button>
      </div>
      <button class="bigbtn secondary" id="closeSettingsBtn" style="margin-top:10px;">닫기</button>
    </div>
  </div>
</div>

<script>
/* =========================================================

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
function resize(){
  const stage = document.getElementById('stage');
  const r = stage.getBoundingClientRect();
  canvas.width = r.width * devicePixelRatio;
  canvas.height = r.height * devicePixelRatio;
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  W = r.width; H = r.height;
}
let W=360,H=640;
window.addEventListener('resize', resize);

// ---------- 카메라 (캐릭터를 계속 따라감) ----------
let camX = 0, camY = 0;
let zoom = 1; // 고도가 높아질수록 줌아웃, 슬램 시 줌인

// ---------- 연출(이펙트) 상태 ----------
let particles = []; // {x,h,vx,vh,life,maxLife,color,size,kind}
let shakeTimer = 0, shakeMag = 0, shakeDur = 0.001;
let hitStopTimer = 0;
let launchFxTimer = 0;
let ringFx = []; // {x,h,life,maxLife,color}

function screenShake(mag, dur){
  if (mag >= shakeMag){ shakeMag = mag; shakeDur = dur; shakeTimer = dur; }
  else { shakeTimer = Math.max(shakeTimer, dur); }
}
function hitStop(dur){ hitStopTimer = Math.max(hitStopTimer, dur); }

function spawnParticles(wx, wh, count, opts){
  opts = opts || {};
  for (let i=0;i<count;i++){
    const ang = rand(0, Math.PI*2);
    const spd = rand(opts.minSpd||6, opts.maxSpd||22);
    particles.push({
      x: wx + rand(-1,1), h: wh + rand(0,1),
      vx: Math.cos(ang)*spd*(opts.dirBias?Math.abs(Math.cos(ang)):1),
      vh: Math.abs(Math.sin(ang))*spd*0.7 + (opts.upBias||0),
      life: 0, maxLife: rand(opts.minLife||0.3, opts.maxLife||0.7),
      color: opts.color || "#ffffff",
      size: rand(opts.minSize||2, opts.maxSize||5),
    });
  }
}
function spawnRing(wx, wh, color){
  ringFx.push({ x:wx, h:wh, life:0, maxLife:0.45, color: color||"#ffffff" });
}

const launchOriginXFrac = 0.28; // 캔버스 내 캐릭터의 대략적 고정 x 위치 비율

// ---------- 유틸 ----------
function rand(a,b){ return a + Math.random()*(b-a); }
function pick(weights){
  const total = weights.reduce((s,w)=>s+w[1],0);
  let r = Math.random()*total;
  for (const [v,w] of weights){ if (r<w) return v; r-=w; }
  return weights[0][0];
}
function showToast(text){ toastText = text; toastTimer = 1.1; }

function zoneName(alt){
  if (alt < 100) return "지상";
  if (alt < 200) return "상공";
  if (alt < 300) return "성층권";
  return "우주";
}
function skyColors(alt){
  if (alt < 100) return [ "#bfe6c9", "#7ec8e3" ];
  if (alt < 200) return [ "#7ec8e3", "#3f7fc9" ];
  if (alt < 300) return [ "#2b3d8f", "#141a4a" ];
  return [ "#0a0a1f", "#000000" ];
}

// ---------- 스폰 ----------
function spawnItemsUpTo(targetX){
  while (nextItemSpawnX < targetX){
    // 초반(0~350m)은 케이크가 촘촘하게, 갈수록 희귀해지고 간격도 넓어짐
    const rampEnd = 350;
    const ramp = Math.max(0, Math.min(1, nextItemSpawnX / rampEnd)); // 0(초반) → 1(멀리)
    const cakeWeight = 34 * (1 - ramp) + 8 * ramp;
    const coinWeight = 60 * (1 - ramp) + 78 * ramp;
    const spacingMin = 14 * (1 - ramp) + 45 * ramp;
    const spacingMax = 24 * (1 - ramp) + 80 * ramp;

    const type = pick([["coin",coinWeight],["cake",cakeWeight],["mango",10],["star",3]]);
    // 지표면 위주로 낮게 배치 (가끔만 살짝 높은 곳)
    const hh = Math.random() < 0.8 ? rand(1.5, 10) : rand(10, 26);
    items.push({ x: nextItemSpawnX + rand(-3,3), h: hh, type, taken:false });
    nextItemSpawnX += rand(spacingMin, spacingMax);
  }
}
function spawnPadsUpTo(targetX){
  while (nextPadSpawnX < targetX){
    const type = pick([["boost",1],["sticky",1],["jump",1],["none",2]]);
    const len = rand(6,12);
    if (type !== "none") padZones.push({ x1: nextPadSpawnX, x2: nextPadSpawnX+len, type });
    nextPadSpawnX += rand(35,55);
  }
}

// ---------- 발사 ----------
function resetRun(){
  x=0; h=0; vx=0; vy=0;
  camX=0; camY=0; zoom=1;
  angleDeg=45; angleDir=1; power=0; powerDir=1;
  slamGauge=100; slamCount=0; isSlamming=false;
  coinsThisRun=0; maxDistanceThisRun=0;
  items=[]; padZones=[]; nextItemSpawnX=20; nextPadSpawnX=60;
  spinTimer=0; spinAngle=0; starTimer=0;
  state = STATE.AIM;
}

function launch(){
  const basePower = 88 + upgrades.power.level*7;
  const p = 0.55 + (power/100)*0.5; // 최소 55% 위력 보장 (시원하게 날아가도록)
  const speed = basePower * p;
  const rad = angleDeg * Math.PI/180;
  vx = Math.cos(rad)*speed;
  vy = Math.sin(rad)*speed;
  facing = 1;
  state = STATE.FLY;

  // 발사 연출: 화면 흔들림 + 먼지 폭발 + 스피드라인
  launchFxTimer = 0.45;
  screenShake(9, 0.28);
  spawnParticles(x, h, 22, { color:"#ffffff", minSpd:14, maxSpd:34, minLife:.3, maxLife:.6, upBias:4, minSize:2, maxSize:5 });
  spawnRing(x, h, "rgba(255,255,255,.8)");
}

// ---------- 슬램 (게이지가 100% 가득 찼을 때만 사용 가능) ----------
function trySlam(){
  if (state !== STATE.FLY) return;
  if (slamGauge < 100){ showToast("게이지 충전 중..."); return; }
  slamGauge = 0;
  slamCount++;
  isSlamming = true;
  // 순수 수직 강하: 아래로 내려찍는 동작이므로 수평 속도는 건드리지 않음
  vy = -Math.max(46, Math.abs(vy)*1.3 + 28);
  screenShake(4, 0.15);
  spawnParticles(x, h, 8, { color:"#ffd23f", minSpd:4, maxSpd:12, minLife:.2, maxLife:.4, minSize:1.5, maxSize:3 });
}

// ---------- 아이템 효과 ----------
const CAKE_SPEED_BOOST = 16;  // 케이크: 수평 속도에 고정 수치 추가
const MANGO_SPEED_PENALTY = 14; // 망고: 수평 속도에서 고정 수치 차감

function applyItemEffect(type){
  if (type === "coin"){ coinsThisRun++; showToast("+코인"); }
  else if (type === "cake"){ vx += CAKE_SPEED_BOOST; vy += 5; showToast("케이크! 속도 +"+CAKE_SPEED_BOOST); }
  else if (type === "mango"){ vx = Math.max(2, vx - MANGO_SPEED_PENALTY); spinTimer = 0.9; showToast("망고... 속도 -"+MANGO_SPEED_PENALTY); }
  else if (type === "star"){
    starTimer = 5;
    vx = Math.max(vx, 74);
    showToast("★ 무적 & 최고속도!");
    for (const it of items){
      if (!it.taken && Math.abs(it.x - x) < 30) { it.taken = true; coinsThisRun++; }
    }
  }
}

const ITEM_FX_COLOR = { coin:"#ffd23f", cake:"#ff9ec4", mango:"#8a6b2f", star:"#fff2a0" };
function checkItemCollisions(){
  for (const it of items){
    if (it.taken) continue;
    if (Math.abs(it.x - x) < 4 && Math.abs(it.h - h) < 9){
      it.taken = true;
      applyItemEffect(it.type);
      spawnParticles(it.x, it.h, it.type==="star"?24:10, {
        color: ITEM_FX_COLOR[it.type], minSpd:5, maxSpd: it.type==="star"?26:14,
        minLife:.25, maxLife:.5, minSize:1.5, maxSize:3.5
      });
    }
  }
}

function checkPadCollision(){
  for (const p of padZones){
    if (x >= p.x1 && x <= p.x2 && !p._hit){
      p._hit = true;
      if (p.type === "boost"){ vx *= 1.5; showToast("가속 발판!"); screenShake(6,0.15); spawnParticles(x,0,14,{color:"#ff8a4a",minSpd:8,maxSpd:24,minLife:.25,maxLife:.5,dirBias:true}); }
      else if (p.type === "sticky"){ vx *= 0.5; showToast("접착 발판..."); spawnParticles(x,0,8,{color:"#6b4a2f",minSpd:2,maxSpd:8,minLife:.3,maxLife:.5}); }
      else if (p.type === "jump"){ vy = Math.max(vy, 22); h = Math.max(h,0.1); state = STATE.FLY; showToast("점프대!"); screenShake(6,0.15); spawnParticles(x,0,14,{color:"#4ad0ff",minSpd:6,maxSpd:20,minLife:.25,maxLife:.5,upBias:8}); }
    }
    if (x > p.x2 + 40) p._hit = false; // allow re-trigger far later if looped (not used but safe)
  }
}

// ---------- 메인 물리 업데이트 ----------
function updateFx(dt){
  if (shakeTimer>0){ shakeTimer -= dt; if (shakeTimer<0){shakeTimer=0; shakeMag=0;} }
  for (const p of particles){ p.life += dt; p.x += p.vx*dt; p.h += p.vh*dt; p.vh -= GRAVITY*0.6*dt; }
  particles = particles.filter(p=>p.life < p.maxLife);
  for (const r of ringFx){ r.life += dt; }
  ringFx = ringFx.filter(r=>r.life < r.maxLife);
}

function update(dt){
  if (paused) return;
  if (toastTimer>0) toastTimer -= dt;
  if (spinTimer>0){
    spinTimer -= dt;
    const spinSpeed = 22 * Math.min(1, spinTimer/0.3); // 끝날 때 서서히 느려지며 자연스럽게 멈춤
    spinAngle += spinSpeed*dt;
  }
  if (starTimer>0) starTimer -= dt;
  if (launchFxTimer>0) launchFxTimer -= dt;
  updateFx(dt);

  // 카메라는 캐릭터를 부드럽게 따라감 (황소키우기 스타일)
  const camLerp = Math.min(1, CAM_FOLLOW*dt);
  camX += (x - camX) * camLerp;

  // 100m 이내: 땅과 캐릭터가 항상 같이 보이도록 줌으로 조절
  // 100m 이상: 땅을 억지로 보여줄 필요 없이, 적당히 줌인해서 캐릭터와 주변이 잘 보이게 그냥 따라감
  const groundMarginPx = 30;
  const baseGroundYNow = H*GROUND_Y_RATIO;
  const camYCap = Math.max(4, (H - groundMarginPx - baseGroundYNow) / (PX_PER_M * Math.max(zoom, 0.4)));
  const FAR_ZOOM = 0.82;
  const blendStart = 85, blendEnd = 130; // 이 구간에서 "땅 보이기" 모드 → "캐릭터 중심 보기" 모드로 자연스럽게 전환
  const blendT = Math.max(0, Math.min(1, (Math.max(0,h) - blendStart) / (blendEnd - blendStart)));
  const blend = blendT*blendT*(3 - 2*blendT); // smoothstep - 더 자연스러운 전환

  const camYTargetNear = Math.min(h, camYCap);
  const camYTargetFar = h; // 100m 이상에서는 그냥 캐릭터 고도를 그대로 따라감
  const camYTarget = camYTargetNear*(1-blend) + camYTargetFar*blend;
  camY += (camYTarget - camY) * camLerp;

  let targetZoom = isSlamming ? 1.22 : (Math.max(0.55, 1 - Math.min(h,blendEnd)/70)*(1-blend) + FAR_ZOOM*blend);
  zoom += (targetZoom - zoom) * Math.min(1, 3.2*dt);

  if (hitStopTimer>0){ hitStopTimer -= dt; return; } // 타격 정지 프레임 - 물리는 잠시 멈춤

  if (state === STATE.AIM){
    angleDeg += angleDir * 55 * dt;
    if (angleDeg > 85){ angleDeg=85; angleDir=-1; }
    if (angleDeg < 5){ angleDeg=5; angleDir=1; }
  }
  else if (state === STATE.POWER){
    power += powerDir * 120 * dt;
    if (power > 100){ power=100; powerDir=-1; }
    if (power < 0){ power=0; powerDir=1; }
  }
  else if (state === STATE.FLY){
    const drag = 1 - Math.min(0.35, (0.02 - upgrades.drag.level*0.0015) * dt * 2);
    vy -= GRAVITY*dt;
    vx *= drag;
    x += vx*dt;
    h += vy*dt;
    if (!isSlamming) slamGauge = Math.min(100, slamGauge + (50 + upgrades.slam.level*10)*dt);

    spawnItemsUpTo(x + 220);
    spawnPadsUpTo(x + 220);
    checkItemCollisions();

    maxDistanceThisRun = Math.max(maxDistanceThisRun, x);

    if (h <= 0){
      const impactSpeed = Math.abs(vy);
      h = 0;
      if (isSlamming){
        isSlamming = false;
        // 파워 슬램 착지: 강한 충격 이펙트 (위치 조절용 - 수평 속도 손실은 일반 착지와 동일)
        hitStop(0.06);
        screenShake(16, 0.32);
        spawnParticles(x, h, 34, { color:"#ff8a4a", minSpd:16, maxSpd:46, minLife:.35, maxLife:.75, upBias:6, minSize:3, maxSize:7 });
        spawnRing(x, h, "rgba(255,138,74,.9)");
        vy = impactSpeed * 0.55;
        vx *= (0.88 + upgrades.weight.level*0.009); // 슬램 착지는 일반 착지보다 손실이 적음 (12%)
        if (vx < 3.5 || vy < 3){ state = STATE.GROUND; }
      } else {
        // 일반 착지: 통통 튀는 바운스 - 수직 속도는 확실히 줄지만 수평 속도는 많이 유지되어
        // 바운스를 거듭하며 점점 낮고 빠르게 튀다가 구르기로 이어진다 (황소날리기류 물리)
        const bigHit = impactSpeed > 10;
        screenShake(bigHit?7:3, bigHit?0.2:0.12);
        spawnParticles(x, h, bigHit?16:8, { color:"#d8c9a8", minSpd:6, maxSpd:bigHit?22:14, minLife:.3, maxLife:.6, upBias:2, minSize:2, maxSize:4.5 });
        vy = impactSpeed * (0.48 + upgrades.weight.level*0.015);
        vx *= (0.82 + upgrades.weight.level*0.012); // 맨땅 착지마다 확실히 감속 (약 18% 손실)
        if (vy < 2.5 || vx < 3.5){ state = STATE.GROUND; vy = 0; }
      }
    }
  }
  else if (state === STATE.GROUND){
    // 구르기: 일정한 제동력(저속에서도 꾸준히 작동) + 속도에 비례하는 공기/마찰 저항을 함께 적용
    // 임계치 없이 전 구간에서 자연스럽게 감속되고, 낮은 속도에서도 늘어지지 않고 깔끔하게 멈춘다
    const constDecel = 2.0 - upgrades.weight.level*0.15;   // 항상 작동하는 기본 제동 (저속에서 특히 체감)
    const propDecay = 0.16 - upgrades.weight.level*0.013;  // 속도 비례 저항 (고속일 때 특히 체감)
    vx = Math.max(0, vx - constDecel*dt);
    vx *= Math.max(0, 1 - propDecay*dt);
    x += vx*dt;
    checkPadCollision();
    checkItemCollisions();
    maxDistanceThisRun = Math.max(maxDistanceThisRun, x);
    if (vx < 1.2){ finishRun(); }
  }
}

function finishRun(){
  state = STATE.STOPPED;
  bank += coinsThisRun;
  if (maxDistanceThisRun > bestDistance) bestDistance = maxDistanceThisRun;
  showResult();
}

// ---------- 랭크 (500m 단위) ----------
function rankFor(dist){
  if (dist < 500) return "C";
  if (dist < 1000) return "B";
  if (dist < 1500) return "A";
  if (dist < 2000) return "S";
  if (dist < 2500) return "SS";
  if (dist < 3000) return "SSS";
  return "LEGEND";
}

// ---------- 렌더 ----------
// 각 스프라이트의 투명 여백(특히 캐릭터 발 아래쪽 여백) 비율 - 실측값 기반
// 이 값만큼 그려지는 위치를 아래로 보정해서 "이미지 바닥"이 아니라 "실제 캐릭터 발"이 지면에 닿도록 함
const SPRITE_BOTTOM_PAD = { ready: 0.024, fly: 0.238, slam: 0.267, stop: 0.143 };

function currentSpriteKey(){
  if (state === STATE.AIM || state === STATE.POWER) return 'ready';
  if (state === STATE.FLY) return isSlamming ? 'slam' : 'fly';
  if (state === STATE.GROUND) return 'fly';
  return 'stop';
}
function currentSprite(){
  return imgEls[currentSpriteKey()];
}

function draw(){
  ctx.clearRect(0,0,W,H);

  ctx.save();
  if (shakeTimer>0){
    const curMag = shakeMag * (shakeTimer / shakeDur);
    const dx = rand(-curMag, curMag), dy = rand(-curMag, curMag);
    ctx.translate(dx, dy);
  }

  // 배경 (고도별 그라디언트) - 줌과 무관하게 항상 화면 전체를 채움
  const alt = Math.max(0,h);
  const [c1,c2] = skyColors(alt);
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,c2); g.addColorStop(1,c1);
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,H);

  // 별 (고고도)
  if (alt > 250){
    ctx.fillStyle = "rgba(255,255,255,.8)";
    for (let i=0;i<40;i++){
      const sx = (i*97 + (x*3)%W) % W;
      const sy = (i*53) % (H*0.6);
      ctx.fillRect(sx, sy, 1.6, 1.6);
    }
  }

  // 줌 (고도가 높을수록 줌아웃, 슬램 시 줌인) - 캐릭터의 고정 화면 위치를 기준으로 확대/축소
  ctx.save();
  const zoomAnchorX = W*launchOriginXFrac, zoomAnchorY = H*GROUND_Y_RATIO;
  ctx.translate(zoomAnchorX, zoomAnchorY);
  ctx.scale(zoom, zoom);
  ctx.translate(-zoomAnchorX, -zoomAnchorY);

  const baseGroundY = H*GROUND_Y_RATIO;
  const originX = W*launchOriginXFrac;

  function worldToScreenX(wx){ return originX + (wx - camX)*PX_PER_M; }
  function worldToScreenY(wh){ return baseGroundY - (wh - camY)*PX_PER_M; }
  const groundY = worldToScreenY(0); // 실제 지면

  // 지면 - 줌 아웃되어도 항상 화면 좌우/아래 끝까지 채워지도록 로컬 좌표를 역산해서 확장
  const localLeft = zoomAnchorX - zoomAnchorX/zoom;
  const localRight = zoomAnchorX + (W - zoomAnchorX)/zoom;
  const localBottom = zoomAnchorY + (H - zoomAnchorY)/zoom;
  ctx.fillStyle = alt < 8 ? "#8fce97" : "#6b9e78";
  ctx.fillRect(localLeft, groundY, localRight-localLeft, Math.max(localBottom, H) - groundY);
  ctx.strokeStyle = "rgba(0,0,0,.15)";
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(localLeft,groundY); ctx.lineTo(localRight,groundY); ctx.stroke();

  // 거리 눈금
  ctx.fillStyle = "rgba(255,255,255,.35)";
  ctx.font = "10px sans-serif";
  for (let m = Math.floor((camX-40)/20)*20; m < camX+60; m+=20){
    const sx = worldToScreenX(m);
    if (sx<localLeft-20||sx>localRight+20) continue;
    ctx.fillRect(sx,groundY-4,1.5,8);
    if (m%100===0) ctx.fillText((m*DISPLAY_SCALE)+"m", sx-10, groundY+16);
  }

  // 발판(기믹)
  for (const p of padZones){
    const sx1 = worldToScreenX(p.x1), sx2 = worldToScreenX(p.x2);
    if (sx2 < localLeft-10 || sx1 > localRight+10) continue;
    const padW = sx2 - sx1;
    if (p.type === "boost" || p.type === "sticky"){
      const isBoost = p.type === "boost";
      ctx.fillStyle = isBoost ? "#ff8a4a" : "#6b4a2f";
      ctx.fillRect(sx1, groundY-7, padW, 7);
      // 화살표 패턴 (가속: >>>, 감속: <<<)
      ctx.strokeStyle = isBoost ? "rgba(255,255,255,.9)" : "rgba(255,255,255,.55)";
      ctx.lineWidth = 2.5;
      const chevronW = 9, gap = 7, n = Math.max(1, Math.floor(padW/(chevronW+gap)));
      const startX = sx1 + (padW - n*(chevronW+gap) + gap)/2;
      for (let i=0;i<n;i++){
        const cx = startX + i*(chevronW+gap);
        const dir = isBoost ? 1 : -1;
        ctx.beginPath();
        ctx.moveTo(cx - dir*chevronW/2, groundY-11);
        ctx.lineTo(cx + dir*chevronW/2, groundY-3.5);
        ctx.lineTo(cx - dir*chevronW/2, groundY+4);
        ctx.stroke();
      }
    } else {
      ctx.fillStyle = "#4ad0ff";
      ctx.fillRect(sx1, groundY-6, padW, 6);
    }
  }

  // 아이템
  for (const it of items){
    if (it.taken) continue;
    const sx = worldToScreenX(it.x), sy = worldToScreenY(it.h);
    if (sx<localLeft-20||sx>localRight+20) continue;
    drawItem(sx,sy,it.type);
  }

  // 발사 스피드라인 (캐릭터 뒤)
  if (launchFxTimer>0){
    const t0 = launchFxTimer/0.45;
    const opx = worldToScreenX(x), opy = worldToScreenY(h);
    ctx.strokeStyle = `rgba(255,255,255,${0.7*t0})`;
    ctx.lineWidth = 3;
    for (let i=0;i<7;i++){
      const ang = (angleDeg*Math.PI/180) + rand(-0.5,0.5);
      const len = rand(20,60)*t0;
      ctx.beginPath();
      ctx.moveTo(opx - Math.cos(ang)*4, opy + Math.sin(ang)*4);
      ctx.lineTo(opx - Math.cos(ang)*len, opy + Math.sin(ang)*len);
      ctx.stroke();
    }
  }

  // 캐릭터
  const px = worldToScreenX(x), py = worldToScreenY(h);
  const spriteKey = currentSpriteKey();
  const img = imgEls[spriteKey];
  const sizeM = 11; // 캐릭터 표시 크기(미터 환산)
  const sizePx = sizeM*PX_PER_M;
  const bottomPad = (SPRITE_BOTTOM_PAD[spriteKey]||0) * sizePx; // 투명 여백만큼 아래로 보정
  ctx.save();
  ctx.translate(px, py - sizePx*0.5 + bottomPad);
  let rot = 0;
  if (state===STATE.FLY) rot = Math.atan2(-vy,vx)*0.35;
  if (spinTimer>0) rot += spinAngle;
  if (state===STATE.GROUND) rot = (x*8)%(Math.PI*2);
  ctx.rotate(rot);
  if (starTimer>0){
    ctx.shadowColor = "#ffd23f"; ctx.shadowBlur = 20;
  }
  let stretchX = 1, stretchY = 1;
  if (isSlamming){ stretchX = 0.82; stretchY = 1.22; }
  else if (state===STATE.GROUND){ stretchX = 1.1; stretchY = 0.9; }
  ctx.scale(stretchX, stretchY);
  if (img.complete && img.naturalWidth>0){
    ctx.drawImage(img, -sizePx/2, -sizePx/2, sizePx, sizePx);
  } else {
    ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(0,0,sizePx/2,0,7); ctx.fill();
  }
  ctx.restore();

  // 파티클 (먼지/충격 이펙트)
  for (const p of particles){
    const t = p.life / p.maxLife;
    const sx = worldToScreenX(p.x), sy = worldToScreenY(p.h);
    ctx.globalAlpha = Math.max(0, 1-t);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(sx, sy, p.size*(1-t*0.5), 0, 7);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // 충격 링 이펙트
  for (const r of ringFx){
    const t = r.life / r.maxLife;
    const sx = worldToScreenX(r.x), sy = worldToScreenY(r.h);
    ctx.globalAlpha = Math.max(0, 1-t);
    ctx.strokeStyle = r.color;
    ctx.lineWidth = 4*(1-t);
    ctx.beginPath();
    ctx.arc(sx, sy, 10 + t*55, 0, 7);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  ctx.restore(); // 줌 종료
  ctx.restore(); // 카메라 흔들림 종료

  // 조준 UI
  if (state===STATE.AIM){
    drawAimArc(px,py);
  } else if (state===STATE.POWER){
    drawPowerGauge(px,py);
  }

  // 토스트
  const toastEl = document.getElementById('toast');
  toastEl.style.opacity = toastTimer>0 ? Math.min(1,toastTimer*2) : 0;
  toastEl.textContent = toastText;

  // HUD 텍스트 업데이트
  document.getElementById('distanceReadout').innerHTML = Math.floor(Math.max(x,0)*DISPLAY_SCALE)+"<span> m</span>";
  document.getElementById('coinCount').textContent = coinsThisRun;
  document.getElementById('zoneLabel').textContent = zoneName(alt) + " · " + Math.floor(alt*DISPLAY_SCALE) + "m";
  document.getElementById('slamFill').style.height = slamGauge+"%";

  const speedPct = Math.round(Math.abs(vx)/BASE_MAX_SPEED*100);
  document.getElementById('speedNum').textContent = speedPct;
  document.getElementById('speedFill').style.width = Math.min(100, speedPct)+"%";

  // 액션 버튼 라벨
  const btn = document.getElementById('actionBtn');
  if (state===STATE.AIM) btn.textContent = "각도 고정";
  else if (state===STATE.POWER) btn.textContent = "발사!";
  else if (state===STATE.FLY) btn.textContent = "슬램!";
  else btn.textContent = "-";
  btn.style.opacity = (state===STATE.GROUND||state===STATE.STOPPED) ? 0.35 : 1;
}

function drawAimArc(px,py){
  const r = 70;
  ctx.strokeStyle="rgba(255,255,255,.35)";
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.arc(px,py,r, -Math.PI/2, 0); // 우측 상단 사분면 (0°=오른쪽, 90°=위)
  ctx.stroke();
  const rad = angleDeg*Math.PI/180;
  const ax = px + Math.cos(rad)*r;
  const ay = py - Math.sin(rad)*r;
  ctx.strokeStyle = "#ffd23f"; ctx.lineWidth=4;
  ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(ax,ay); ctx.stroke();
  ctx.fillStyle="#ffd23f";
  ctx.beginPath(); ctx.arc(ax,ay,5,0,7); ctx.fill();
  ctx.fillStyle="#fff"; ctx.font="12px sans-serif";
  ctx.fillText(Math.round(angleDeg)+"°", ax+8, ay-4);
}

function drawPowerGauge(px,py){
  const gx = px+34, gy0 = py+20, gh=90;
  ctx.fillStyle="rgba(255,255,255,.15)";
  ctx.fillRect(gx,gy0-gh,14,gh);
  const fillH = gh*(power/100);
  ctx.fillStyle="#ff6b4a";
  ctx.fillRect(gx,gy0-fillH,14,fillH);
  ctx.strokeStyle="rgba(255,255,255,.5)"; ctx.strokeRect(gx,gy0-gh,14,gh);
}

function drawItem(sx,sy,type){
  ctx.save();
  ctx.translate(sx,sy);
  if (type==="coin"){
    ctx.fillStyle="#ffd23f"; ctx.strokeStyle="#c99a10"; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(0,0,8,0,7); ctx.fill(); ctx.stroke();
    ctx.fillStyle="#c99a10"; ctx.font="10px sans-serif"; ctx.textAlign="center";
    ctx.fillText("₩",0,3);
  } else if (type==="cake"){
    ctx.font="18px sans-serif"; ctx.textAlign="center"; ctx.fillText("🍰",0,6);
  } else if (type==="mango"){
    ctx.font="18px sans-serif"; ctx.textAlign="center"; ctx.fillText("🥭",0,6);
  } else if (type==="star"){
    ctx.shadowColor="#ffd23f"; ctx.shadowBlur=14;
    ctx.font="20px sans-serif"; ctx.textAlign="center"; ctx.fillText("⭐",0,6);
  }
  ctx.restore();
}

// ---------- 액션 버튼 ----------
function onAction(){
  if (state===STATE.AIM){ state=STATE.POWER; }
  else if (state===STATE.POWER){ launch(); }
  else if (state===STATE.FLY){ trySlam(); }
}
document.getElementById('actionBtn').addEventListener('click', onAction);
window.addEventListener('keydown', (e)=>{ if (e.code==='Space'){ e.preventDefault(); onAction(); } });

// ---------- 오버레이 제어 ----------
const startOverlay = document.getElementById('startOverlay');
const resultOverlay = document.getElementById('resultOverlay');
const shopOverlay = document.getElementById('shopOverlay');
const settingsOverlay = document.getElementById('settingsOverlay');

// ---------- 배경음악 (간단한 반복 멜로디, 별도 오디오 파일 없이 생성) ----------
let audioCtx = null, bgmMasterGain = null, bgmPlaying = false, bgmTimer = null;
let bgmVolume = 0.4, bgmMuted = false;
const BGM_NOTES = [261.63, 293.66, 329.63, 392.00, 440.00, 392.00, 329.63, 293.66];

function initAudio(){
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  bgmMasterGain = audioCtx.createGain();
  bgmMasterGain.gain.value = bgmMuted ? 0 : bgmVolume;
  bgmMasterGain.connect(audioCtx.destination);
}
function scheduleNote(freq, startTime, dur){
  const osc = audioCtx.createOscillator();
  osc.type = 'sine';
  osc.frequency.value = freq;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0, startTime);
  g.gain.linearRampToValueAtTime(0.35, startTime+0.06);
  g.gain.linearRampToValueAtTime(0, startTime+dur);
  osc.connect(g); g.connect(bgmMasterGain);
  osc.start(startTime); osc.stop(startTime+dur+0.05);
}
function bgmLoop(){
  if (!bgmPlaying) return;
  const noteDur = 0.42;
  const t0 = audioCtx.currentTime + 0.05;
  BGM_NOTES.forEach((f,i)=> scheduleNote(f, t0+i*noteDur, noteDur*0.9));
  bgmTimer = setTimeout(bgmLoop, BGM_NOTES.length*noteDur*1000);
}
function startBGM(){
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (bgmPlaying) return;
  bgmPlaying = true;
  bgmLoop();
}
function stopBGM(){
  bgmPlaying = false;
  if (bgmTimer) clearTimeout(bgmTimer);
}
function applyBgmVolume(){
  if (bgmMasterGain) bgmMasterGain.gain.value = bgmMuted ? 0 : bgmVolume;
}

document.getElementById('bgmVolume').addEventListener('input', (e)=>{
  bgmVolume = e.target.value/100;
  if (bgmVolume>0 && bgmMuted){ bgmMuted=false; document.getElementById('bgmMuteBtn').textContent='🔊 켜짐'; }
  applyBgmVolume();
});
document.getElementById('bgmMuteBtn').addEventListener('click', ()=>{
  bgmMuted = !bgmMuted;
  document.getElementById('bgmMuteBtn').textContent = bgmMuted ? '🔇 꺼짐' : '🔊 켜짐';
  applyBgmVolume();
});

function showResult(){
  document.getElementById('rankText').textContent = rankFor(maxDistanceThisRun);
  document.getElementById('finalDist').textContent = Math.floor(maxDistanceThisRun*DISPLAY_SCALE);
  document.getElementById('coinsGained').textContent = coinsThisRun;
  document.getElementById('bestDist').textContent = Math.floor(bestDistance*DISPLAY_SCALE)+" m";
  document.getElementById('slamCount').textContent = slamCount;
  resultOverlay.classList.remove('hidden');
}

document.getElementById('startBtn').addEventListener('click', ()=>{
  startOverlay.classList.add('hidden');
  resetRun();
  startBGM();
});
document.getElementById('retryBtn').addEventListener('click', ()=>{
  resultOverlay.classList.add('hidden');
  resetRun();
});
document.getElementById('shopBtnStart').addEventListener('click', ()=> openShop(startOverlay));
document.getElementById('shopBtnResult').addEventListener('click', ()=> openShop(resultOverlay));
document.getElementById('closeShopBtn').addEventListener('click', closeShop);

let shopReturnEl = null;
function openShop(returnEl){
  shopReturnEl = returnEl;
  returnEl.classList.add('hidden');
  renderShop();
  shopOverlay.classList.remove('hidden');
}
function closeShop(){
  shopOverlay.classList.add('hidden');
  if (shopReturnEl) shopReturnEl.classList.remove('hidden');
}

// ---------- 설정 ----------
let paused = false;
let settingsReturnEl = null; // 설정을 열기 전 보이고 있던 오버레이 (없으면 게임 플레이 중)
function openSettings(){
  settingsReturnEl = [startOverlay, resultOverlay, shopOverlay].find(el => !el.classList.contains('hidden')) || null;
  if (settingsReturnEl) settingsReturnEl.classList.add('hidden');
  else paused = true; // 플레이 중이었다면 설정 여는 동안 잠시 정지
  settingsOverlay.classList.remove('hidden');
}
function closeSettings(){
  settingsOverlay.classList.add('hidden');
  if (settingsReturnEl) settingsReturnEl.classList.remove('hidden');
  paused = false;
}
document.getElementById('settingsBtn').addEventListener('click', openSettings);
document.getElementById('closeSettingsBtn').addEventListener('click', closeSettings);
document.getElementById('settingsRetryBtn').addEventListener('click', ()=>{
  settingsOverlay.classList.add('hidden');
  [startOverlay, resultOverlay, shopOverlay].forEach(el=>el.classList.add('hidden'));
  paused = false;
  resetRun();
});
document.getElementById('settingsMenuBtn').addEventListener('click', ()=>{
  settingsOverlay.classList.add('hidden');
  [resultOverlay, shopOverlay].forEach(el=>el.classList.add('hidden'));
  paused = false;
  resetRun();
  startOverlay.classList.remove('hidden');
});

function renderShop(){
  document.getElementById('bankAmt').textContent = bank;
  const list = document.getElementById('upgradeList');
  list.innerHTML = "";
  for (const key in upgrades){
    const u = upgrades[key];
    const cost = upgradeCost(u);
    const maxed = u.level >= u.max;
    const card = document.createElement('div');
    card.className = "upgrade-card";
    card.innerHTML = `
      <div class="info">
        <div class="name">${u.name}</div>
        <div class="desc">${u.desc}</div>
        <div class="lvl">Lv. ${u.level} / ${u.max}</div>
      </div>
      <button ${maxed || bank<cost ? "disabled":""}>${maxed?"MAX":cost+" 🪙"}</button>
    `;
    card.querySelector('button').addEventListener('click', ()=>{
      if (u.level>=u.max || bank<cost) return;
      bank -= cost; u.level++;
      renderShop();
    });
    list.appendChild(card);
  }
}

// ---------- 루프 ----------
let lastT = performance.now();
function loop(t){
  const dt = Math.min(0.033, (t-lastT)/1000);
  lastT = t;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

resize();
resetRun();
state = STATE.AIM; // resetRun already sets this, kept for clarity
requestAnimationFrame(loop);
</script>
</body>
